<!DOCTYPE html>
<html>
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="katex.min.css">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0D1117;
      --surface:   #161B22;
      --border:    #21262D;
      --accent:    #58A6FF;
      --accent-dim:#1F4B8E;
      --green:     #3FB950;
      --text:      #E6EDF3;
      --muted:     #8B949E;
      --error:     #F85149;
      --warn:      #D29922;
      --radius:    8px;
      --font-ui:   'Inter', system-ui, sans-serif;
      --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
    }

    html, body { width: 100%; height: 100vh; background: var(--bg); color: var(--text); font-family: var(--font-ui); font-size: 13px; overflow: hidden; }

    .panel { display: flex; flex-direction: column; height: 100vh; padding: 14px 14px 12px; gap: 10px; }

    /* ── HEADER ── */
    .header { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .logo { width: 28px; height: 28px; background: var(--accent); border-radius: 6px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .header-text h1 { font-size: 13px; font-weight: 600; letter-spacing: 0.01em; line-height: 1; }
    .header-text p  { font-size: 10px; color: var(--muted); margin-top: 2px; font-family: var(--font-mono); }
    .key-toggle { margin-left: auto; background: none; border: 1px solid var(--border); color: var(--muted); border-radius: 5px; padding: 4px 8px; font-size: 10px; font-family: var(--font-ui); cursor: pointer; transition: border-color .15s, color .15s; }
    .key-toggle:hover { border-color: var(--accent); color: var(--accent); }

    /* ── API KEY ── */
    .key-section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px; display: flex; flex-direction: column; gap: 7px; flex-shrink: 0; }
    .key-section.hidden { display: none; }
    .key-row { display: flex; gap: 6px; }
    .key-input { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 5px; color: var(--text); font-family: var(--font-mono); font-size: 11px; padding: 7px 10px; outline: none; transition: border-color .15s; }
    .key-input:focus { border-color: var(--accent); }
    .key-input::placeholder { color: var(--muted); }
    .btn-save { background: var(--accent-dim); border: 1px solid var(--accent); color: var(--accent); border-radius: 5px; padding: 7px 12px; font-size: 11px; font-weight: 500; font-family: var(--font-ui); cursor: pointer; white-space: nowrap; transition: background .15s, color .15s; }
    .btn-save:hover { background: var(--accent); color: #0D1117; }
    .key-status { font-size: 10px; font-family: var(--font-mono); color: var(--green); display: none; }
    .key-status.visible { display: block; }

    .divider { border: none; border-top: 1px solid var(--border); flex-shrink: 0; }

    /* ── BOTTOM TOOLBAR ── */
    .toolbar { display: flex; gap: 7px; flex-shrink: 0; align-items: center; }
    .btn-hint { flex: 1; background: var(--accent); border: none; border-radius: var(--radius); color: #0D1117; font-size: 13px; font-weight: 600; font-family: var(--font-ui); padding: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; transition: background .15s, transform .1s; }
    .btn-hint:hover:not(:disabled) { background: #79B8FF; }
    .btn-hint:active:not(:disabled) { transform: scale(0.98); }
    .btn-hint:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }

    .hint-counter { font-size: 10px; font-family: var(--font-mono); color: var(--muted); white-space: nowrap; min-width: 36px; text-align: center; }

    .btn-reset { background: none; border: 1px solid var(--border); color: var(--muted); border-radius: var(--radius); padding: 10px 11px; cursor: pointer; font-size: 13px; line-height: 1; transition: border-color .15s, color .15s; display: flex; align-items: center; justify-content: center; }
    .btn-reset:hover { border-color: var(--error); color: var(--error); }

    /* ── RESULT AREA ── */
    .result-wrapper { flex: 1; min-height: 0; display: flex; flex-direction: column; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .result-header { display: flex; align-items: center; justify-content: space-between; padding: 7px 12px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .result-label { font-size: 10px; font-family: var(--font-mono); color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }

    /* Progress pip track */
    .hint-pips { display: flex; gap: 4px; }
    .pip { width: 16px; height: 4px; border-radius: 2px; background: var(--border); transition: background .3s; }
    .pip.done   { background: var(--green); }
    .pip.active { background: var(--accent); }
    .pip.final  { background: var(--warn); }

    #result { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
    #result::-webkit-scrollbar { width: 4px; }
    #result::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .placeholder { color: var(--muted); font-style: italic; font-size: 12px; padding: 4px 2px; }

    /* ── HINT CARDS ── */
    .hint-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 12px;
      animation: slideIn .2s ease;
    }
    @keyframes slideIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

    .hint-old  { opacity: 0.55; }
    .hint-latest { border-color: var(--accent); opacity: 1; }

    .hint-meta { display: flex; align-items: center; gap: 7px; margin-bottom: 7px; }
    .hint-num  { font-family: var(--font-mono); font-size: 10px; color: var(--muted); }
    .hint-label {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 2px 6px;
      border-radius: 3px;
      background: var(--accent-dim);
      color: var(--accent);
    }
    .hint-latest .hint-label { background: var(--accent); color: #0D1117; }

    .hint-body { font-family: var(--font-mono); font-size: 12px; line-height: 1.65; color: var(--text); white-space: pre-wrap; }

    .hint-exhausted { font-size: 11px; color: var(--warn); font-family: var(--font-mono); text-align: center; padding: 8px; border: 1px dashed var(--warn); border-radius: 6px; opacity: 0.8; }

    /* ── LOADING ── */
    .loading-wrap { display: flex; flex-direction: column; gap: 8px; }
    .loading-text { color: var(--muted); font-size: 11px; font-family: var(--font-mono); display: flex; align-items: center; gap: 5px; }
    .cursor { display: inline-block; width: 7px; height: 13px; background: var(--accent); border-radius: 1px; animation: blink 1s step-end infinite; vertical-align: middle; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    .progress-bar { width: 100%; height: 2px; background: var(--border); border-radius: 1px; overflow: hidden; }
    .progress-fill { height: 100%; width: 30%; background: var(--accent); border-radius: 1px; animation: slide 1.8s ease-in-out infinite; }
    @keyframes slide { 0%{transform:translateX(-100%);width:30%} 50%{width:60%} 100%{transform:translateX(400%);width:30%} }

    .error-text { color: var(--error); font-family: var(--font-mono); font-size: 11px; }

    /* ── KATEX ── */
    .katex { font-size: 1em; }
    .katex-display { margin: 6px 0; }
  </style>

  <script defer src="katex.min.js"></script>
  <script defer src="auto-render.min.js"></script>
</head>
<body>
<div class="panel">

  <!-- Header -->
  <div class="header">
    <div class="logo">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M3 4.5L7 8L3 11.5" stroke="#0D1117" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M9 11h4" stroke="#0D1117" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="header-text">
      <h1>CF Coach</h1>
      <p>powered by gemini</p>
    </div>
    <button class="key-toggle" id="key-toggle">API Key</button>
  </div>

  <!-- API Key Section -->
  <div class="key-section hidden" id="key-section">
    <div class="key-row">
      <input type="password" class="key-input" id="api-key" placeholder="AIza...">
      <button class="btn-save" id="save-key">Save</button>
    </div>
    <div class="key-status" id="key-status">API Key saved</div>
  </div>

  <hr class="divider">

  <!-- Result area -->
  <div class="result-wrapper">
    <div class="result-header">
      <span class="result-label">Hints</span>
      <div class="hint-pips" id="hint-pips">
        <div class="pip" data-i="0"></div>
        <div class="pip" data-i="1"></div>
        <div class="pip" data-i="2"></div>
        <div class="pip" data-i="3"></div>
        <div class="pip" data-i="4"></div>
      </div>
    </div>
    <div id="result">
      <span class="placeholder">Open a Codeforces problem, then click Get Hint.</span>
    </div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <button class="btn-hint" id="get-hint">Get Hint</button>
    <span class="hint-counter" id="hint-counter"></span>
    <button class="btn-reset" id="reset-btn" title="Reset hints">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M2 8a6 6 0 1 0 1.2-3.6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        <path d="M2 4v4h4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>

</div>
<script src="sidebar.js"></script>
</body>
</html>
